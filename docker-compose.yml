services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: supportlens
      POSTGRES_PASSWORD: supportlens
      POSTGRES_DB: supportlens
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supportlens"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/litellm.yaml", "--port", "4000"]
    volumes:
      - ./infra/litellm.yaml:/app/litellm.yaml:ro
    ports:
      - "4000:4000"
    depends_on:
      - ollama

  api:
    build:
      context: ./apps/api
    environment:
      SUPPORTLENS_DATABASE_URL: postgresql+psycopg://supportlens:supportlens@postgres:5432/supportlens
      SUPPORTLENS_REDIS_URL: redis://redis:6379/0
      SUPPORTLENS_LITELLM_BASE_URL: http://litellm:4000/v1
      SUPPORTLENS_OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - litellm

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_SUPPORTLENS_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  ingestion-worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    command: ["python", "-m", "workers.ingestion.main"]
    depends_on:
      - redis
      - api

  evaluation-worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    command: ["python", "-m", "workers.evaluation.main"]
    depends_on:
      - redis
      - api

volumes:
  ollama:
